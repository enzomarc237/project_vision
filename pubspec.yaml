name: project_vision
description: AI-Powered Project Scaffolding Tool
publish_to: 'none' # Remove this line if you intend to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0' # Adjusted based on typical Flutter project requirements

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  riverpod: ^2.3.6
  flutter_riverpod: ^2.3.6
  http: ^0.13.5 # Consider updating to a newer version if available e.g. ^1.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.0.15
  firebase_core: ^2.13.1
  firebase_auth: ^4.6.2
  cloud_firestore: ^4.8.0
  flutter_markdown: ^0.6.14
  pdf: ^3.10.1
  url_launcher: ^6.1.11
  share_plus: ^7.0.2
  flutter_quill: ^7.2.0
  macos_ui: ^1.12.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0 # Or a newer version

flutter:
  uses-material-design: true
